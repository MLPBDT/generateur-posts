<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de Posts IA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0a0f; --surface: #13131a; --border: #22222e; --accent: #c8f135; --text: #f0f0f0; --muted: #666680; --radius: 16px; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px 16px; background-image: radial-gradient(ellipse 60% 40% at 80% 10%, #1a1030 0%, transparent 60%), radial-gradient(ellipse 40% 30% at 10% 80%, #0d1a0a 0%, transparent 50%); }
  .wrap { max-width: 720px; margin: 0 auto; }
  header { margin-bottom: 40px; }
  .badge { display: inline-block; background: var(--accent); color: #000; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; margin-bottom: 14px; }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(28px, 5vw, 44px); font-weight: 800; line-height: 1.1; letter-spacing: -1px; }
  h1 span { color: var(--accent); }
  .sub { margin-top: 10px; color: var(--muted); font-size: 15px; font-weight: 300; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
  label { display: block; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  input, select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 12px 16px; outline: none; transition: border-color .2s; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width: 520px) { .grid2 { grid-template-columns: 1fr; } }
  .field { margin-bottom: 20px; }
  .field:last-child { margin-bottom: 0; }
  .platforms { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 2px; }
  .platform-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; padding: 7px 16px; cursor: pointer; transition: all .2s; text-transform: uppercase; }
  .platform-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 28px; text-align: center; cursor: pointer; transition: all .2s; position: relative; min-height: 100px; }
  .upload-zone:hover { border-color: var(--accent); }
  .upload-zone.has-image { border-style: solid; border-color: var(--accent); padding: 0; overflow: hidden; }
  .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; padding: 0; }
  .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-text { color: var(--muted); font-size: 14px; }
  .upload-text span { color: var(--accent); }
  .preview-img { width: 100%; max-height: 260px; object-fit: cover; border-radius: 10px; display: none; }
  .preview-img.show { display: block; }
  .remove-photo { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,.7); border: none; color: #fff; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; display: none; z-index: 2; }
  .remove-photo.show { display: block; }
  .btn-generate { width: 100%; background: var(--accent); color: #000; border: none; border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: 1px; padding: 18px; cursor: pointer; transition: all .2s; text-transform: uppercase; }
  .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(200,241,53,.25); }
  .btn-generate:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
  .loader { display: none; align-items: center; gap: 10px; color: var(--muted); font-size: 14px; padding: 16px 0; }
  .loader.show { display: flex; }
  .dots span { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce .8s infinite; }
  .dots span:nth-child(2) { animation-delay: .15s; }
  .dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: .3; } 40% { transform: translateY(-6px); opacity: 1; } }
  .results { display: none; }
  .results.show { display: block; }
  .post-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; animation: fadeUp .4s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .post-photo { width: 100%; max-height: 220px; object-fit: cover; display: none; }
  .post-photo.show { display: block; }
  .post-body { padding: 24px; }
  .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .post-platform { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
  .post-actions { display: flex; gap: 8px; }
  .copy-btn, .dl-btn { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; padding: 5px 12px; cursor: pointer; transition: all .2s; font-family: 'DM Sans', sans-serif; }
  .copy-btn:hover, .dl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--accent); color: var(--accent); }
  .post-text { font-size: 15px; line-height: 1.7; white-space: pre-wrap; color: var(--text); }
  .error-box { background: #1a0a0a; border: 1px solid #3a1010; border-radius: 12px; color: #ff6b6b; padding: 16px; font-size: 14px; display: none; margin-top: 16px; }
  .error-box.show { display: block; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; margin-top: 28px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge">✦ Propulsé par IA</div>
    <h1>Génère tes posts<br><span>réseaux sociaux</span></h1>
    <p class="sub">Ajoute une photo, décris ton business — l'IA rédige tes contenus en secondes.</p>
  </header>

  <div class="card">
    <div class="field">
      <label>Ta photo (optionnel)</label>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)" />
        <img class="preview-img" id="previewImg" src="" alt="preview" />
        <button class="remove-photo" id="removeBtn" onclick="removePhoto(event)">✕ Supprimer</button>
        <div id="uploadPlaceholder">
          <div class="upload-icon">📸</div>
          <p class="upload-text">Glisse ta photo ici ou <span>clique pour choisir</span></p>
          <p class="upload-text" style="font-size:12px;margin-top:4px;">L'IA génère des posts en lien avec ta photo</p>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label>Ton business / activité</label>
      <input type="text" id="business" placeholder="Ex: Restaurant italien à Toulon, Coach sportif, Boutique vêtements..." />
    </div>
    <div class="field">
      <label>Message ou promo du moment (optionnel)</label>
      <input type="text" id="promo" placeholder="Ex: Soldes -30%, nouveau menu, promotion spéciale..." />
    </div>
    <div class="grid2">
      <div class="field">
        <label>Ton de voix</label>
        <select id="tone">
          <option value="professionnel">Professionnel</option>
          <option value="sympathique et chaleureux" selected>Sympathique</option>
          <option value="humoristique">Humoristique</option>
          <option value="luxe et raffiné">Luxe et Raffiné</option>
          <option value="dynamique et énergique">Dynamique</option>
        </select>
      </div>
      <div class="field">
        <label>Nombre de posts</label>
        <select id="count">
          <option value="3">3 posts</option>
          <option value="5" selected>5 posts</option>
          <option value="7">7 posts</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Plateformes ciblées</label>
      <div class="platforms">
        <button class="platform-btn active" data-p="Instagram">Instagram</button>
        <button class="platform-btn active" data-p="Facebook">Facebook</button>
        <button class="platform-btn" data-p="LinkedIn">LinkedIn</button>
        <button class="platform-btn" data-p="TikTok">TikTok</button>
        <button class="platform-btn" data-p="Twitter/X">Twitter/X</button>
      </div>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" onclick="generate()">⚡ Générer mes posts</button>
  <div class="loader" id="loader"><div class="dots"><span></span><span></span><span></span></div>L'IA rédige tes posts...</div>
  <div class="error-box" id="errorBox"></div>
  <div class="results" id="results">
    <p class="section-title">Tes posts générés</p>
    <div id="postsContainer"></div>
  </div>
</div>

<script>
  var uploadedPhotoDataUrl = null;
  var uploadedPhotoDesc = null;

  document.querySelectorAll('.platform-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { btn.classList.toggle('active'); });
  });

  function handlePhoto(event) {
    var file = event.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      uploadedPhotoDataUrl = e.target.result;
      uploadedPhotoDesc = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
      document.getElementById('previewImg').src = uploadedPhotoDataUrl;
      document.getElementById('previewImg').classList.add('show');
      document.getElementById('removeBtn').classList.add('show');
      document.getElementById('uploadPlaceholder').style.display = 'none';
      document.getElementById('uploadZone').classList.add('has-image');
    };
    reader.readAsDataURL(file);
  }

  function removePhoto(e) {
    e.stopPropagation();
    uploadedPhotoDataUrl = null;
    uploadedPhotoDesc = null;
    document.getElementById('previewImg').src = '';
    document.getElementById('previewImg').classList.remove('show');
    document.getElementById('removeBtn').classList.remove('show');
    document.getElementById('uploadPlaceholder').style.display = 'block';
    document.getElementById('uploadZone').classList.remove('has-image');
    document.getElementById('photoInput').value = '';
  }

  function getSelectedPlatforms() {
    return Array.from(document.querySelectorAll('.platform-btn.active')).map(function(b) { return b.dataset.p; });
  }

  function showError(msg) {
    var el = document.getElementById('errorBox');
    el.textContent = msg;
    el.classList.add('show');
  }

  async function generate() {
    var business = document.getElementById('business').value.trim();
    var promo = document.getElementById('promo').value.trim();
    var tone = document.getElementById('tone').value;
    var count = document.getElementById('count').value;
    var platforms = getSelectedPlatforms();

    document.getElementById('errorBox').classList.remove('show');
    if (!business) { showError('Décris ton business pour continuer.'); return; }
    if (!platforms.length) { showError('Sélectionne au moins une plateforme.'); return; }

    document.getElementById('generateBtn').disabled = true;
    document.getElementById('loader').classList.add('show');
    document.getElementById('results').classList.remove('show');

    var photoLine = uploadedPhotoDesc ? '- Une photo a été uploadée ("' + uploadedPhotoDesc + '"). Génère des posts en lien avec cette photo.\n' : '';
    var promoLine = promo ? ('- Promo/message : ' + promo + '\n') : '';
    var prompt = 'Tu es un expert en marketing digital.\n\nGénère exactement ' + count + ' posts pour :\n- Business : ' + business + '\n- Plateformes : ' + platforms.join(', ') + '\n' + promoLine + photoLine + '- Ton : ' + tone + '\n\nVarie les angles, adapte à chaque plateforme, inclus emojis et appel à l\'action.\n\nRéponds UNIQUEMENT en JSON valide sans backticks :\n{"posts": [{"platform": "nom", "content": "texte"}, ...]}';

    try {
      var res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
      });
      if (!res.ok) { var err = await res.json(); throw new Error(err.error || 'Erreur ' + res.status); }
      var data = await res.json();
      var text = (data.content || []).map(function(b) { return b.text || ''; }).join('');
      var clean = text.replace(/```json|```/g, '').trim();
      var parsed = JSON.parse(clean);
      renderPosts(parsed.posts || []);
    } catch(e) {
      showError('Erreur : ' + (e.message || 'Réessaie dans quelques instants.'));
    } finally {
      document.getElementById('generateBtn').disabled = false;
      document.getElementById('loader').classList.remove('show');
    }
  }

  function renderPosts(posts) {
    var container = document.getElementById('postsContainer');
    container.innerHTML = '';
    if (!posts.length) { showError('Aucun post généré. Réessaie.'); return; }
    posts.forEach(function(post, i) {
      var card = document.createElement('div');
      card.className = 'post-card';
      card.style.animationDelay = (i * 0.08) + 's';
      var photoHtml = uploadedPhotoDataUrl ? '<img class="post-photo show" src="' + uploadedPhotoDataUrl + '" alt="photo" />' : '';
      var dlBtn = uploadedPhotoDataUrl ? '<button class="dl-btn" onclick="downloadPhoto(' + i + ')">⬇ Photo</button>' : '';
      card.innerHTML = photoHtml + '<div class="post-body"><div class="post-header"><span class="post-platform">' + escHtml(post.platform) + '</span><div class="post-actions">' + dlBtn + '<button class="copy-btn" onclick="copyPost(this,\'post-' + i + '\')">Copier</button></div></div><div class="post-text" id="post-' + i + '">' + escHtml(post.content) + '</div></div>';
      container.appendChild(card);
    });
    document.getElementById('results').classList.add('show');
  }

  function downloadPhoto(i) {
    if (!uploadedPhotoDataUrl) return;
    var a = document.createElement('a');
    a.href = uploadedPhotoDataUrl;
    a.download = 'photo-post-' + (i+1) + '.jpg';
    a.click();
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function copyPost(btn, id) {
    var text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = '✓ Copié !';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 2000);
    });
  }
</script>
</body>
</html>
